version: "2.0"

attack:
  default_duration: 60
  default_packet_size: 102400
  max_concurrent_attacks: 500
  timeout_threshold: 300

network:
  default_port: 20000
  default_ip: "127.0.0.1"
  allowed_ip_ranges:
    - "0.0.0.0/0"
    - "192.168.0.0/16"
    - "10.0.0.0/8"
  protocol: UDP

logging:
  enabled: true
  level: INFO
  file: attack.log
  rotation:
    max_size_mb: 1000
    backup_count: 50

security:
  authentication_required: true
  allowed_users: []
  rate_limiting:
    enabled: true
    requests_per_minute: 60

monitoring:
  health_check_interval: 30
  metrics_enabled: true
  alert_thresholds:
    cpu_warning: 700
    cpu_critical: 900
    memory_warning: 750
    memory_critical: 950
    
